# UFOMAP private parameter overrides for the summer school mapping demo.
# Loaded under /ufomap_mapping_server_node before launching ufomap_mapping_server_node.
# Keep this file small and explicit so the operator flow stays easy to audit.

# World frame used for the published map and TF lookups.
frame_id: "map"

# Robot/base frame used for sensor-origin carving and clearing.
robot_frame_id: "base_link"

# Maximum ray length in metres. -1 disables truncation.
max_range: -1.0

# Insert depth for the semantic integration tree.
insert_depth: 0

# Use the fast ray-casting path when possible.
simple_ray_casting: false

# Stop ray integration early once the target voxel is reached.
early_stopping: 0

# Process incoming clouds asynchronously.
async: true

# Clear occupied cells around the robot footprint.
clear_robot: false

# Robot footprint and clearance model used by the server.
robot_height: 0.20
robot_radius: 0.50

# Additional clearing depth used by the server.
clearing_depth: 0

# Store the map uncompressed in the demo image for easier inspection.
compress: false

# Update only the touched part of the map.
update_part_of_map: true

# Disable background update loops; the bag replay drives the cadence.
update_rate: 0.0

# Publish a depth-limited map view for the RViz plugin.
publish_depth: 4

# Bayesian update parameters.
prob_hit: 0.70
prob_miss: 0.40

# Occupancy clamping bounds.
clamping_thres_min: 0.1192
clamping_thres_max: 0.971

# Map publication rate in Hz.
pub_rate: 0.0

# TF wait timeout in seconds.
transform_timeout: 0.1

# Internal queue sizing for map and cloud inputs.
map_queue_size: 10
cloud_in_queue_size: 10

# Keep the last published map alive for RViz subscribers.
map_latch: false

# Reduce log noise in the demo container.
verbose: false

# Worker threads used by the node spinner.
num_workers: 1
