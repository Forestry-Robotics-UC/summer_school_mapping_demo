# Summer school live-demo parameter reference for the existing ENTFAC mapping flow.
# The entfac_mapping_ros semantic_mapping.launch loads package configs by backend/site.
# UFOMAP uses config/ufomap_demo.yaml and a direct ufomap_mapping_server_node launch.

# Mapper input topic produced by PRUNE.
pointcloud_topic: "/ouster/rgb_colored"

# Mapper world frame used for TF lookup and map publication.
world_frame: "map"

# Valid ENTFAC backend for this reference config.
backend: "bonxai"

# Publish rate for the accumulated semantic map point cloud.
publish_rate_hz: 2.0

# Metrics publication rate for operator monitoring.
metrics_rate_hz: 0.2

# Semantic/occupancy layer settings for the forest label set.
layers:
  # Occupancy layer stores observed free/occupied structure.
  occupancy: {}
  # Semantics layer stores class distributions per mapped cell.
  semantics:
    # Number of semantic classes in the prepared forest mask stream.
    num_classes: 13
    # Dirichlet prior for semantic fusion.
    prior_alpha: 0.5
    # Upper bound for accumulated semantic evidence.
    alpha_sum_max: 100.0
    # Semantic fusion rule used by the mapper.
    fusion_rule: "dirichlet"
